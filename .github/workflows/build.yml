name: Build Vue + Spring Boot

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node setup s cache pro rychlejší příští buildy
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Instalace frontend závislostí (zde se nainstaluje i Axios)
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Build Vue app
      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # Příprava složky v backendu a kopírování buildu
      - name: Copy frontend to backend
        run: |
          mkdir -p backend/src/main/resources/static
          rm -rf backend/src/main/resources/static/*
          cp -r frontend/dist/* backend/src/main/resources/static/

      # Setup Java s cache pro Maven
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # Build Spring Boot
      - name: Build backend
        run: mvn clean package -DskipTests
        working-directory: backend

      # Upload výsledného JARu
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: spring-app
          path: backend/target/*.jar